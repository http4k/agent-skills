name: Update on http4k release
on:
  repository_dispatch:
    types:
      - http4k-release
  workflow_dispatch:
    inputs:
      version:
        description: 'http4k version to generate skills for'
        required: true
        type: string

jobs:
  regenerate-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate skill content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          claude -p \
            --dangerously-skip-permissions \
            --model opus \
            "Read the file .claude/commands/generate-skill.md for instructions. Follow those instructions exactly, using version ${VERSION} as the version argument. The \$ARGUMENTS placeholder in that file should be replaced with ${VERSION}."

      - name: Verify generation
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          head -1 plugins/http4k/skills/http4k-development/SKILL.md | grep -q "^---"
          grep -q "$VERSION" plugins/http4k/.claude-plugin/plugin.json
          grep -q "$VERSION" .claude-plugin/marketplace.json
          test ! -d ./tmp/http4k

      - name: Commit and tag
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upgrade to http4k ${VERSION}"
          git tag "${VERSION}"
          git push origin main --tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          gh release create "${VERSION}" \
            --title "http4k ${VERSION}" \
            --notes "Automated release tracking http4k ${VERSION}" \
            --target main
